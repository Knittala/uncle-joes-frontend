server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cache static assets for a reasonable time
    location ~* \.(?:js|css|ico|png|jpg|jpeg|gif|svg|woff2?)$ {
        expires 1h;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA fallback — Vue Router (history mode) needs every unknown path
    # to serve index.html so the router can handle it client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
